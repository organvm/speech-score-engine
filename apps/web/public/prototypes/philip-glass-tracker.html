<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Philip Glass Buys a Loaf of Bread — Speech-Score</title>
    <!--
      Self-contained prototype. No build, no network, no dependencies. Opens offline (file://).
      Renders David Ives' "Philip Glass Buys a Loaf of Bread" as a living speech-score:
      the page becomes a four-voice tracker that phases, fragments, and converges to unison.
      Aesthetic mirrors the Kindle source pages (warm serif on dark slate).
      Layout is fully fluid — fills the viewport, reflows on resize; columns stay in their lanes.
      Audio: real voices via the Web Speech API (browser-native neural TTS), with a Web Audio
      tone layer as fallback. Per-$VOICE_CHANNEL voice + pitch so the four are distinguishable.
      Provenance: dramaturgist-tuning-markdown-archive/source-attachments/ (the 7 genesis screenshots).
      Speech-score instrument — unit = $PHRASE_EVENT, ordered by $TEMPORAL_RELATION.
    -->
    <style>
      :root {
        --stage: #101012;
        --page: #34393b;         /* Kindle dark-mode paper */
        --page-edge: #3d4244;
        --ink: #e9e6dc;          /* warm cream */
        --ink-faint: rgba(233, 230, 220, 0.16);
        --ink-spoken: rgba(233, 230, 220, 0.52);
        --rule: rgba(233, 230, 220, 0.10);
        --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, "Times New Roman", serif;
        --accent: #cdbf9a;         /* warm gold — live/human lane */
        --lanes: repeat(4, minmax(0, 1fr)); /* set by the engine from the score's lane count */
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: var(--stage); }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: var(--serif);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }
      .frame {
        position: relative;
        width: 100vw;
        height: 100dvh;
        background: var(--page);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.22);
      }

      /* ---- title ---- */
      .title { padding: clamp(14px, 2.2vh, 30px) 24px clamp(8px, 1.2vh, 16px); text-align: center; }
      .title .mark {
        font-family: var(--serif);
        font-size: clamp(8px, 0.9vw, 12px);
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: rgba(233, 230, 220, 0.4);
      }
      .title h1 {
        font-weight: 500;
        font-size: clamp(16px, 2.4vw, 32px);
        letter-spacing: 0.02em;
        margin-top: clamp(6px, 0.9vh, 12px);
        font-variant: small-caps;
        color: var(--ink);
      }
      .title .by { font-size: clamp(10px, 1.2vw, 16px); font-style: italic; color: rgba(233, 230, 220, 0.45); margin-top: 4px; }

      /* ---- column headers ---- */
      .heads {
        display: grid;
        grid-template-columns: clamp(1.4rem, 3vw, 3rem) var(--lanes);
        padding: 6px clamp(10px, 1.4vw, 22px) 8px;
        border-bottom: 1px solid var(--rule);
        margin: 4px clamp(8px, 1vw, 18px) 0;
      }
      .heads .h {
        font-size: clamp(8.5px, 1vw, 13px);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        text-align: left;
        color: rgba(233, 230, 220, 0.62);
        padding-left: 4px;
        min-width: 0;
      }
      .heads .h.gut { text-align: center; }
      .heads .h.live { color: var(--accent); }
      .heads .h.live::after { content: " ●"; font-size: 0.7em; vertical-align: middle; }

      /* ---- score viewport ---- */
      .viewport { position: relative; flex: 1; overflow: hidden; margin: 0 clamp(8px, 1vw, 18px); }
      .viewport::before, .viewport::after {
        content: "";
        position: absolute;
        left: 0; right: 0;
        height: 42px;
        pointer-events: none;
        z-index: 3;
      }
      .viewport::before { top: 0; background: linear-gradient(var(--page), transparent); }
      .viewport::after { bottom: 0; background: linear-gradient(transparent, var(--page)); }
      .track { position: absolute; inset: 0 0 auto 0; transition: transform 0.12s linear; will-change: transform; }
      .row {
        display: grid;
        grid-template-columns: clamp(1.4rem, 3vw, 3rem) var(--lanes);
        min-height: clamp(24px, 3.4vh, 46px);
        align-items: center;
      }
      .rownum {
        font-size: clamp(7px, 0.8vw, 11px);
        color: rgba(233, 230, 220, 0.14);
        text-align: center;
        font-family: var(--serif);
        user-select: none;
      }
      .row.here .rownum { color: rgba(233, 230, 220, 0.5); }
      /* the playhead: a soft luminous band on the active row (spans the full row height) */
      .row.here::before {
        content: "";
        position: absolute;
        top: 0; bottom: 0;
        left: calc(-1 * clamp(8px, 1vw, 18px)); right: calc(-1 * clamp(8px, 1vw, 18px));
        background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.07), rgba(255,255,255,0.02));
        box-shadow: 0 0 26px rgba(200, 220, 255, 0.06);
        pointer-events: none;
      }
      .cell { position: relative; padding-left: 4px; min-width: 0; }
      .word {
        display: inline-block;
        max-width: 100%;
        font-size: clamp(13px, 1.5vw, 23px);
        line-height: 1.2;
        letter-spacing: 0.01em;
        color: var(--ink);
        opacity: 0.16;               /* faint on the page until struck */
        overflow-wrap: anywhere;
        transition: opacity 0.5s ease, text-shadow 0.5s ease;
      }
      .word.spoken { opacity: 0.52; }  /* already performed: stays legible */
      .word.now {
        opacity: 1;
        text-shadow: 0 0 16px rgba(233, 230, 220, 0.55), 0 0 3px rgba(233, 230, 220, 0.6);
        animation: bloom 0.5s ease-out;
      }
      .word.stage { font-style: italic; font-size: clamp(11px, 1.3vw, 19px); opacity: 0.3; }
      /* a live (human-performed) line: the engine leaves it silent; the actor speaks it */
      .word.live { color: var(--accent); text-decoration: underline dotted rgba(205, 191, 154, 0.4); }
      .word.live.now { text-shadow: 0 0 16px rgba(205, 191, 154, 0.6), 0 0 3px rgba(205, 191, 154, 0.7); }
      @keyframes bloom {
        0% { transform: translateY(0.5px); text-shadow: 0 0 26px rgba(233,230,220,0.9); }
        100% { transform: translateY(0); }
      }

      /* ---- caption ---- */
      .caption {
        padding: 9px 20px 6px;
        font-size: clamp(9px, 1.1vw, 14px);
        font-style: italic;
        color: rgba(233, 230, 220, 0.4);
        text-align: center;
        border-top: 1px solid var(--rule);
        margin: 0 clamp(8px, 1vw, 18px);
      }

      /* ---- transport (quiet, literary) ---- */
      .transport { padding: 8px 16px 16px; display: flex; flex-direction: column; gap: 9px; align-items: center; }
      .trow { display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap; }
      .btn {
        font-family: var(--serif);
        font-size: 11px;
        letter-spacing: 0.04em;
        padding: 6px 13px;
        border-radius: 3px;
        border: 1px solid var(--rule);
        background: transparent;
        color: rgba(233, 230, 220, 0.82);
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }
      .btn:hover { background: rgba(233, 230, 220, 0.06); color: var(--ink); }
      .btn.primary { border-color: rgba(233, 230, 220, 0.32); color: var(--ink); }
      .btn.on { background: rgba(233, 230, 220, 0.1); color: var(--ink); }
      .seg { display: flex; border: 1px solid var(--rule); border-radius: 3px; overflow: hidden; }
      .seg button {
        font-family: var(--serif);
        font-size: 9.5px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 6px 9px;
        background: transparent;
        color: rgba(233, 230, 220, 0.42);
        border: none;
        border-right: 1px solid var(--rule);
        cursor: pointer;
      }
      .seg button:last-child { border-right: none; }
      .seg button.on { background: rgba(233, 230, 220, 0.09); color: var(--ink); }
      .tempo { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 300px; }
      .tempo label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(233, 230, 220, 0.42); }
      .tempo input { flex: 1; accent-color: #cdbf9a; height: 2px; }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="title">
        <div class="mark">Speech-Score Engine</div>
        <h1 id="title">Philip Glass Buys a Loaf of Bread</h1>
        <div class="by" id="byline">a speech-score, after David Ives</div>
      </div>

      <div class="heads" id="heads"></div>

      <div class="viewport" id="viewport">
        <div class="track" id="track"></div>
      </div>

      <div class="caption" id="caption">Dialogue as temporal score — text, recurrence, overlap, vocal distribution.</div>

      <div class="transport">
        <div class="trow">
          <div class="seg" id="scores"></div>
        </div>
        <div class="tempo">
          <label>Tempo</label>
          <input id="tempo" type="range" min="1" max="9" step="0.5" value="3" />
        </div>
        <div class="trow">
          <button class="btn primary" id="play">▷ Perform</button>
          <button class="btn" id="restart">↺ Restart</button>
          <div class="seg" id="sound">
            <button data-m="voice" class="on">Voices</button>
            <button data-m="tone">Tones</button>
            <button data-m="off">Silent</button>
          </div>
        </div>
        <div class="trow">
          <div class="seg" id="sections"></div>
        </div>
      </div>
    </div>

    <!-- Neural voice clips (generated): window.SSE_VOICES. Loads over file:// via a script tag
         (fetch is blocked for local files). Score data + voice packs register onto window; add a
         play = add a scores/<id>.js + voices/<id>.js file and two <script> tags below. -->
    <script src="scores/philip-glass.js"></script>
    <script src="scores/richard-and-anne.js"></script>
    <script src="scores/earnest-duet.js"></script>
    <script src="voices/philip-glass.js"></script>
    <script src="voices/richard-and-anne.js"></script>
    <script src="voices/earnest-duet.js"></script>
    <script>
      // ---- pick the score (data-driven: this engine renders any registered SCORE) ----
      const SCORES = window.SSE_SCORES || {};
      const params = new URLSearchParams(location.search);
      const wanted = params.get('score');
      const ID =
        (wanted && SCORES[wanted] && wanted) ||
        (SCORES['philip-glass'] ? 'philip-glass' : Object.keys(SCORES)[0]);
      const SC = SCORES[ID];
      const CLIPS = ((window.SSE_VOICES || {})[ID] || {}).clips || null;

      const LANES = SC.lanes;
      const CH = LANES.map((l) => l.id);
      const HEAD = {};
      const laneById = new Map(LANES.map((l) => [l.id, l]));
      const isHuman = (lane) => (laneById.get(lane) || {}).performer === 'human';

      // Derive every audio map from the lane casting — one source of truth per lane.
      const TONES = {};
      const CHVOX = {};
      const VOX = {};
      for (const l of LANES) {
        HEAD[l.id] = l.name || l.id;
        TONES[l.id] = { f: (l.tone && l.tone.f) || 440, t: (l.tone && l.tone.type) || 'sine' };
        CHVOX[l.id] = {
          pan: typeof l.pan === 'number' ? l.pan : 0,
          rate: 1.0,
          gain: typeof l.gain === 'number' ? l.gain : 1.0,
        };
        VOX[l.id] = l.speech || { pitch: 1.0, rate: 1.0, prefer: [] };
      }
      const EV = SC.events;
      const SECTIONS = SC.sections || {};
      const TOTAL = SC.total;
      const rand = (a, b) => a + Math.random() * (b - a);

      // Paint the shell from the score.
      document.documentElement.style.setProperty('--lanes', 'repeat(' + CH.length + ', minmax(0, 1fr))');
      document.getElementById('title').textContent = SC.title;
      document.getElementById('byline').textContent = SC.byline || '';
      document.getElementById('caption').textContent = SC.caption || '';
      document.title = SC.title + ' — Speech-Score';

      const eventsByRow = new Map();
      const cellRef = new Map();
      for (const ev of EV) {
        if (!eventsByRow.has(ev.row)) eventsByRow.set(ev.row, []);
        eventsByRow.get(ev.row).push(ev);
      }

      // ---- audio ----
      // 'voice' — pre-rendered NEURAL clips (window.SSE_VOICES[ID]) played as Web Audio buffers:
      //           polyphonic (many at once) + zero-latency. Per-lane pan/register + per-trigger
      //           humanization (detune, timing jitter, gain, LFO vibrato). Human lanes are left
      //           SILENT — a live actor speaks them. Falls back to Web Speech, then to tones.
      let silent = false;
      let soundMode = 'voice';

      // -- source A: real voices (Web Speech API) — fallback when no neural clips are present --
      const synth = window.speechSynthesis || null;
      const VOICE_ASSIGN = {};
      function loadVoices() {
        if (!synth) return;
        const all = synth.getVoices() || [];
        if (!all.length) return;
        const en = all.filter((v) => /en(-|_|$)/i.test(v.lang));
        const pool = en.length ? en : all;
        const used = new Set();
        for (const ch of CH) {
          if (isHuman(ch)) continue;
          let pick = null;
          for (const h of VOX[ch].prefer || []) {
            pick = pool.find((v) => !used.has(v.name) && v.name.toLowerCase().includes(h));
            if (pick) break;
          }
          if (!pick) pick = pool.find((v) => !used.has(v.name)) || pool[0];
          if (pick) {
            VOICE_ASSIGN[ch] = pick;
            used.add(pick.name);
          }
        }
      }
      if (synth) {
        loadVoices();
        synth.addEventListener('voiceschanged', loadVoices);
      }
      function speak(events) {
        if (!synth) return false;
        const seen = new Map();
        for (const ev of events) if (!seen.has(ev.text)) seen.set(ev.text, ev.lane);
        synth.resume();
        if (synth.pending) synth.cancel();
        for (const [text, ch] of seen) {
          const u = new SpeechSynthesisUtterance(text);
          const v = VOICE_ASSIGN[ch];
          if (v) u.voice = v;
          const spec = VOX[ch];
          u.pitch = spec.pitch;
          u.rate = Math.min(2.2, spec.rate * Math.max(1, rps / 3));
          u.volume = 1;
          synth.speak(u);
        }
        return true;
      }

      // -- source B: Web Audio tone stack (final fallback) --
      let ctx = null;
      let master = null;
      function ensureCtx() {
        if (ctx) return true;
        try {
          const C = window.AudioContext || window.webkitAudioContext;
          if (!C) return false;
          ctx = new C();
          master = ctx.createGain();
          master.gain.value = 0.9;
          master.connect(ctx.destination);
          return true;
        } catch (err) {
          ctx = null;
          return false;
        }
      }
      function tone(channel, when) {
        if (!ctx || !master) return;
        const spec = TONES[channel];
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        osc.type = spec.t;
        osc.frequency.setValueAtTime(spec.f, when);
        env.gain.setValueAtTime(0.0001, when);
        env.gain.exponentialRampToValueAtTime(0.2, when + 0.015);
        env.gain.exponentialRampToValueAtTime(0.0001, when + 0.34);
        osc.connect(env);
        env.connect(master);
        osc.start(when);
        osc.stop(when + 0.4);
        osc.onended = () => {
          osc.disconnect();
          env.disconnect();
        };
      }

      // -- source 0: pre-rendered neural clips (window.SSE_VOICES[ID]) as Web Audio buffers --
      const SAMP = { buf: new Map(), ready: false, loading: false };
      function b64ToBuf(b64) {
        const bin = atob(b64);
        const u8 = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i += 1) u8[i] = bin.charCodeAt(i);
        return u8.buffer;
      }
      // Seconds of leading near-silence to skip so a trigger speaks immediately (no pre-roll lag).
      function leadOffset(buffer) {
        const d = buffer.getChannelData(0);
        const thresh = 0.012;
        let i = 0;
        for (; i < d.length; i += 1) if (Math.abs(d[i]) > thresh) break;
        const off = i / buffer.sampleRate - 0.02;
        return off > 0 ? off : 0;
      }
      async function loadSamples() {
        if (SAMP.ready || SAMP.loading) return SAMP.ready;
        if (!CLIPS || !ensureCtx() || !ctx) return false;
        SAMP.loading = true;
        await Promise.all(
          Object.entries(CLIPS).map(async ([key, b64]) => {
            try {
              const buffer = await ctx.decodeAudioData(b64ToBuf(b64));
              SAMP.buf.set(key, { buffer, offset: leadOffset(buffer) });
            } catch (err) {
              /* skip an undecodable clip */
            }
          }),
        );
        SAMP.ready = SAMP.buf.size > 0;
        SAMP.loading = false;
        return SAMP.ready;
      }
      // Play one line on one lane: that character's own neural clip, humanized + panned.
      function playSample(channel, text, when) {
        const clip = SAMP.buf.get(channel + '|' + text) || SAMP.buf.get(text);
        if (!clip || !ctx || !master) return false;
        const spec = CHVOX[channel] || { pan: 0, rate: 1, gain: 1 };
        const src = ctx.createBufferSource();
        src.buffer = clip.buffer;
        src.playbackRate.value = spec.rate * rand(0.997, 1.003);
        if (src.detune) src.detune.value = rand(-8, 8);
        const g = ctx.createGain();
        g.gain.value = spec.gain * rand(0.88, 1.0);
        // subtle pitch LFO — the "low-frequency oscillation"; kept small so speech stays natural
        let lfo = null;
        let lfoGain = null;
        if (src.detune) {
          lfo = ctx.createOscillator();
          lfo.type = 'sine';
          lfo.frequency.value = rand(4.5, 6.5);
          lfoGain = ctx.createGain();
          lfoGain.gain.value = rand(1.5, 4);
          lfo.connect(lfoGain).connect(src.detune);
        }
        const cleanup = (nodes) => () => {
          for (const n of nodes) n.disconnect();
          if (lfo) lfo.stop();
        };
        src.connect(g);
        let tail = [src, g];
        if (ctx.createStereoPanner) {
          const p = ctx.createStereoPanner();
          p.pan.value = spec.pan;
          g.connect(p);
          p.connect(master);
          tail = [src, g, p];
        } else {
          g.connect(master);
        }
        if (lfoGain) tail = tail.concat([lfoGain]);
        const t = Math.max(when, ctx.currentTime);
        src.onended = cleanup(tail);
        src.start(t, clip.offset || 0);
        if (lfo) lfo.start(t);
        return true;
      }

      function voice(events) {
        if (silent || !events || !events.length) return;
        // Human lanes are performed live — never voiced by the engine.
        const audible = events.filter((ev) => !isHuman(ev.lane));
        if (!audible.length) return;
        if (soundMode === 'voice') {
          if (CLIPS) {
            if (SAMP.ready) {
              const base = ctx.currentTime + 0.015;
              let any = false;
              for (const ev of audible) if (playSample(ev.lane, ev.text, base + rand(0, 0.028))) any = true;
              if (any) return;
            } else {
              loadSamples();
              return;
            }
          } else if (synth && speak(audible)) {
            return;
          }
        }
        if (!ensureCtx() || !ctx) return;
        const now = ctx.currentTime;
        for (const ev of audible) tone(ev.lane, now);
      }

      // ---- build view ----
      const track = document.getElementById('track');
      const viewport = document.getElementById('viewport');
      const heads = document.getElementById('heads');

      const gh = document.createElement('div');
      gh.className = 'h gut';
      heads.appendChild(gh);
      for (const c of CH) {
        const el = document.createElement('div');
        el.className = 'h' + (isHuman(c) ? ' live' : '');
        el.textContent = HEAD[c];
        heads.appendChild(el);
      }

      const rowEls = [];
      for (let r = 0; r < TOTAL; r += 1) {
        const row = document.createElement('div');
        row.className = 'row';
        row.style.position = 'relative';
        const num = document.createElement('div');
        num.className = 'rownum';
        num.textContent = r % 4 === 0 ? String(r).padStart(2, '0') : '';
        row.appendChild(num);
        for (const c of CH) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cellRef.set(r + ':' + c, cell);
          row.appendChild(cell);
        }
        track.appendChild(row);
        rowEls.push(row);
      }
      for (const ev of EV) {
        const cell = cellRef.get(ev.row + ':' + ev.lane);
        if (!cell) continue;
        const span = document.createElement('span');
        span.className = 'word' + (ev.stage ? ' stage' : '') + (isHuman(ev.lane) ? ' live' : '');
        span.textContent = ev.text;
        cell.appendChild(span);
        ev.el = span;
      }

      // ---- score picker + section chips (built from the registry / the score) ----
      const scoresSeg = document.getElementById('scores');
      for (const s of Object.values(SCORES)) {
        const b = document.createElement('button');
        b.dataset.score = s.id;
        b.textContent = s.short || s.title;
        if (s.id === ID) b.classList.add('on');
        scoresSeg.appendChild(b);
      }
      scoresSeg.addEventListener('click', (e) => {
        const b = e.target.closest('button');
        if (!b || b.dataset.score === ID) return;
        const p = new URLSearchParams(location.search);
        p.set('score', b.dataset.score);
        location.search = p.toString();
      });

      const sections = document.getElementById('sections');
      for (const key of Object.keys(SECTIONS)) {
        const b = document.createElement('button');
        b.dataset.s = key;
        b.textContent = key.charAt(0).toUpperCase() + key.slice(1);
        sections.appendChild(b);
      }
      const wholeBtn = document.createElement('button');
      wholeBtn.dataset.s = 'full';
      wholeBtn.textContent = 'Whole';
      wholeBtn.classList.add('on');
      sections.appendChild(wholeBtn);

      // ---- state + transport ----
      let playing = false;
      let currentRow = 0;
      let rps = SC.tempo || 3;
      let sel = 'full';
      let rafId = null;
      let lastTs = 0;
      let acc = 0;
      let rowH = 26;
      let visibleRows = 24;
      let hereEl = null;
      let nowWords = [];

      function measure() {
        rowH = rowEls[0] ? rowEls[0].offsetHeight : 26;
        visibleRows = Math.max(8, Math.floor(viewport.clientHeight / rowH));
      }
      function range() {
        return sel === 'full' ? [0, TOTAL - 1] : SECTIONS[sel];
      }
      function clearPerformed() {
        for (const ev of EV) {
          if (ev.el) ev.el.classList.remove('spoken', 'now');
        }
        nowWords = [];
      }
      function render(row) {
        if (hereEl) hereEl.classList.remove('here');
        const el = rowEls[row];
        el.classList.add('here');
        hereEl = el;
        const lead = Math.floor(visibleRows * 0.4);
        const maxOff = Math.max(0, track.scrollHeight - viewport.clientHeight);
        const off = Math.min(Math.max(0, (row - lead) * rowH), maxOff);
        track.style.transform = 'translateY(' + -off + 'px)';
      }
      function illuminate(row) {
        for (const w of nowWords) w.classList.remove('now');
        nowWords = [];
        const evs = eventsByRow.get(row);
        if (!evs) return;
        for (const ev of evs) {
          if (!ev.el) continue;
          ev.el.classList.add('spoken');
          void ev.el.offsetWidth;
          ev.el.classList.add('now');
          nowWords.push(ev.el);
        }
      }
      function advance(row) {
        currentRow = row;
        render(row);
        illuminate(row);
        const evs = eventsByRow.get(row);
        if (evs) voice(evs);
      }

      function loop(ts) {
        const dt = (ts - lastTs) / 1000;
        lastTs = ts;
        acc += dt * rps;
        const [s, e] = range();
        let guard = 0;
        while (acc >= 1 && guard < 8) {
          acc -= 1;
          if (currentRow >= e) {
            clearPerformed();
            advance(s);
          } else {
            advance(currentRow + 1);
          }
          guard += 1;
        }
        rafId = requestAnimationFrame(loop);
      }
      function play() {
        if (playing) return;
        // Prime the active sound source on the gesture (autoplay/TTS both require it).
        if (!silent) {
          ensureCtx();
          if (ctx && ctx.state === 'suspended') ctx.resume();
          if (soundMode === 'voice') {
            if (CLIPS) loadSamples();
            else if (synth) {
              loadVoices();
              synth.resume();
            }
          }
        }
        const [s, e] = range();
        if (currentRow < s || currentRow >= e) {
          clearPerformed();
          advance(s);
        }
        playing = true;
        playBtn.classList.add('on');
        playBtn.textContent = '❚❚ Pause';
        lastTs = performance.now();
        acc = 0;
        rafId = requestAnimationFrame(loop);
      }
      function pause() {
        playing = false;
        playBtn.classList.remove('on');
        playBtn.textContent = '▷ Perform';
        if (synth) synth.cancel();
        if (rafId !== null) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
      }

      const playBtn = document.getElementById('play');
      const restartBtn = document.getElementById('restart');
      const soundSeg = document.getElementById('sound');
      const tempo = document.getElementById('tempo');

      tempo.value = String(rps);
      playBtn.addEventListener('click', () => (playing ? pause() : play()));
      restartBtn.addEventListener('click', () => {
        const [s] = range();
        acc = 0;
        clearPerformed();
        advance(s);
      });
      soundSeg.addEventListener('click', (e) => {
        const b = e.target.closest('button');
        if (!b) return;
        const m = b.dataset.m;
        for (const btn of soundSeg.children) btn.classList.toggle('on', btn === b);
        if (m === 'off') {
          silent = true;
          if (synth) synth.cancel();
          if (ctx && ctx.state === 'running') ctx.suspend();
          return;
        }
        silent = false;
        soundMode = m;
        ensureCtx();
        if (ctx && ctx.state === 'suspended') ctx.resume();
        if (m === 'voice') {
          if (CLIPS) loadSamples();
          else if (synth) {
            loadVoices();
            synth.resume();
          }
        }
      });
      tempo.addEventListener('input', () => {
        rps = parseFloat(tempo.value);
      });
      sections.addEventListener('click', (e) => {
        const b = e.target.closest('button');
        if (!b) return;
        sel = b.dataset.s;
        for (const btn of sections.children) btn.classList.toggle('on', btn === b);
        const [s] = range();
        acc = 0;
        clearPerformed();
        advance(s);
      });
      window.addEventListener('resize', () => {
        measure();
        render(currentRow);
      });

      measure();
      advance(0);
    </script>
  </body>
</html>
