<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Philip Glass Buys a Loaf of Bread — Speech-Score</title>
    <!--
      Self-contained prototype. No build, no network, no dependencies. Opens offline (file://).
      Renders David Ives' "Philip Glass Buys a Loaf of Bread" as a living speech-score:
      the page becomes a four-voice tracker that phases, fragments, and converges to unison.
      Aesthetic mirrors the Kindle source pages (warm serif on dark slate).
      Layout is fully fluid — fills the viewport, reflows on resize; columns stay in their lanes.
      Audio: real voices via the Web Speech API (browser-native neural TTS), with a Web Audio
      tone layer as fallback. Per-$VOICE_CHANNEL voice + pitch so the four are distinguishable.
      Provenance: dramaturgist-tuning-markdown-archive/source-attachments/ (the 7 genesis screenshots).
      Speech-score instrument — unit = $PHRASE_EVENT, ordered by $TEMPORAL_RELATION.
    -->
    <style>
      :root {
        --stage: #101012;
        --page: #34393b;         /* Kindle dark-mode paper */
        --page-edge: #3d4244;
        --ink: #e9e6dc;          /* warm cream */
        --ink-faint: rgba(233, 230, 220, 0.16);
        --ink-spoken: rgba(233, 230, 220, 0.52);
        --rule: rgba(233, 230, 220, 0.10);
        --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, "Times New Roman", serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: var(--stage); }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: var(--serif);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }
      .frame {
        position: relative;
        width: 100vw;
        height: 100dvh;
        background: var(--page);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.22);
      }

      /* ---- title ---- */
      .title { padding: clamp(14px, 2.2vh, 30px) 24px clamp(8px, 1.2vh, 16px); text-align: center; }
      .title .mark {
        font-family: var(--serif);
        font-size: clamp(8px, 0.9vw, 12px);
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: rgba(233, 230, 220, 0.4);
      }
      .title h1 {
        font-weight: 500;
        font-size: clamp(16px, 2.4vw, 32px);
        letter-spacing: 0.02em;
        margin-top: clamp(6px, 0.9vh, 12px);
        font-variant: small-caps;
        color: var(--ink);
      }
      .title .by { font-size: clamp(10px, 1.2vw, 16px); font-style: italic; color: rgba(233, 230, 220, 0.45); margin-top: 4px; }

      /* ---- column headers ---- */
      .heads {
        display: grid;
        grid-template-columns: clamp(1.4rem, 3vw, 3rem) repeat(4, minmax(0, 1fr));
        padding: 6px clamp(10px, 1.4vw, 22px) 8px;
        border-bottom: 1px solid var(--rule);
        margin: 4px clamp(8px, 1vw, 18px) 0;
      }
      .heads .h {
        font-size: clamp(8.5px, 1vw, 13px);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        text-align: left;
        color: rgba(233, 230, 220, 0.62);
        padding-left: 4px;
        min-width: 0;
      }
      .heads .h.gut { text-align: center; }

      /* ---- score viewport ---- */
      .viewport { position: relative; flex: 1; overflow: hidden; margin: 0 clamp(8px, 1vw, 18px); }
      .viewport::before, .viewport::after {
        content: "";
        position: absolute;
        left: 0; right: 0;
        height: 42px;
        pointer-events: none;
        z-index: 3;
      }
      .viewport::before { top: 0; background: linear-gradient(var(--page), transparent); }
      .viewport::after { bottom: 0; background: linear-gradient(transparent, var(--page)); }
      .track { position: absolute; inset: 0 0 auto 0; transition: transform 0.12s linear; will-change: transform; }
      .row {
        display: grid;
        grid-template-columns: clamp(1.4rem, 3vw, 3rem) repeat(4, minmax(0, 1fr));
        min-height: clamp(24px, 3.4vh, 46px);
        align-items: center;
      }
      .rownum {
        font-size: clamp(7px, 0.8vw, 11px);
        color: rgba(233, 230, 220, 0.14);
        text-align: center;
        font-family: var(--serif);
        user-select: none;
      }
      .row.here .rownum { color: rgba(233, 230, 220, 0.5); }
      /* the playhead: a soft luminous band on the active row (spans the full row height) */
      .row.here::before {
        content: "";
        position: absolute;
        top: 0; bottom: 0;
        left: calc(-1 * clamp(8px, 1vw, 18px)); right: calc(-1 * clamp(8px, 1vw, 18px));
        background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.07), rgba(255,255,255,0.02));
        box-shadow: 0 0 26px rgba(200, 220, 255, 0.06);
        pointer-events: none;
      }
      .cell { position: relative; padding-left: 4px; min-width: 0; }
      .word {
        display: inline-block;
        max-width: 100%;
        font-size: clamp(13px, 1.5vw, 23px);
        line-height: 1.2;
        letter-spacing: 0.01em;
        color: var(--ink);
        opacity: 0.16;               /* faint on the page until struck */
        overflow-wrap: anywhere;
        transition: opacity 0.5s ease, text-shadow 0.5s ease;
      }
      .word.spoken { opacity: 0.52; }  /* already performed: stays legible */
      .word.now {
        opacity: 1;
        text-shadow: 0 0 16px rgba(233, 230, 220, 0.55), 0 0 3px rgba(233, 230, 220, 0.6);
        animation: bloom 0.5s ease-out;
      }
      .word.stage { font-style: italic; font-size: clamp(11px, 1.3vw, 19px); opacity: 0.3; }
      @keyframes bloom {
        0% { transform: translateY(0.5px); text-shadow: 0 0 26px rgba(233,230,220,0.9); }
        100% { transform: translateY(0); }
      }

      /* ---- caption ---- */
      .caption {
        padding: 9px 20px 6px;
        font-size: clamp(9px, 1.1vw, 14px);
        font-style: italic;
        color: rgba(233, 230, 220, 0.4);
        text-align: center;
        border-top: 1px solid var(--rule);
        margin: 0 clamp(8px, 1vw, 18px);
      }

      /* ---- transport (quiet, literary) ---- */
      .transport { padding: 8px 16px 16px; display: flex; flex-direction: column; gap: 9px; align-items: center; }
      .trow { display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap; }
      .btn {
        font-family: var(--serif);
        font-size: 11px;
        letter-spacing: 0.04em;
        padding: 6px 13px;
        border-radius: 3px;
        border: 1px solid var(--rule);
        background: transparent;
        color: rgba(233, 230, 220, 0.82);
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }
      .btn:hover { background: rgba(233, 230, 220, 0.06); color: var(--ink); }
      .btn.primary { border-color: rgba(233, 230, 220, 0.32); color: var(--ink); }
      .btn.on { background: rgba(233, 230, 220, 0.1); color: var(--ink); }
      .seg { display: flex; border: 1px solid var(--rule); border-radius: 3px; overflow: hidden; }
      .seg button {
        font-family: var(--serif);
        font-size: 9.5px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 6px 9px;
        background: transparent;
        color: rgba(233, 230, 220, 0.42);
        border: none;
        border-right: 1px solid var(--rule);
        cursor: pointer;
      }
      .seg button:last-child { border-right: none; }
      .seg button.on { background: rgba(233, 230, 220, 0.09); color: var(--ink); }
      .tempo { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 300px; }
      .tempo label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(233, 230, 220, 0.42); }
      .tempo input { flex: 1; accent-color: #cdbf9a; height: 2px; }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="title">
        <div class="mark">Speech-Score Engine</div>
        <h1>Philip Glass Buys a Loaf of Bread</h1>
        <div class="by">a speech-score, after David Ives</div>
      </div>

      <div class="heads" id="heads"></div>

      <div class="viewport" id="viewport">
        <div class="track" id="track"></div>
      </div>

      <div class="caption">Dialogue as temporal score — text, recurrence, overlap, vocal distribution.</div>

      <div class="transport">
        <div class="tempo">
          <label>Tempo</label>
          <input id="tempo" type="range" min="1" max="9" step="0.5" value="3" />
        </div>
        <div class="trow">
          <button class="btn primary" id="play">▷ Perform</button>
          <button class="btn" id="restart">↺ Restart</button>
          <div class="seg" id="sound">
            <button data-m="voice" class="on">Voices</button>
            <button data-m="tone">Tones</button>
            <button data-m="off">Silent</button>
          </div>
        </div>
        <div class="trow">
          <div class="seg" id="sections">
            <button data-s="readable">Readable</button>
            <button data-s="phase">Phase</button>
            <button data-s="fragment">Fragment</button>
            <button data-s="unison">Unison</button>
            <button data-s="full" class="on">Whole</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Neural voice clips (generated): window.SSE_VOICES. Loads over file:// via a script tag
         (fetch is blocked for local files). Absent -> the player falls back to Web Speech. -->
    <script src="philip-glass-voices.js"></script>
    <script>
      const CH = ['FIRST_WOMAN', 'SECOND_WOMAN', 'GLASS', 'BAKER'];
      const HEAD = { FIRST_WOMAN: 'First Woman', SECOND_WOMAN: 'Second Woman', GLASS: 'Glass', BAKER: 'Baker' };
      // per-voice pitch, high -> low, for a Glass-minimalist stack
      const TONES = {
        FIRST_WOMAN: { f: 587.33, t: 'triangle' },
        SECOND_WOMAN: { f: 493.88, t: 'triangle' },
        GLASS: { f: 392.0, t: 'sine' },
        BAKER: { f: 261.63, t: 'sine' },
      };

      // ---- build the score (the arc of the play) ----
      const EV = [];
      const put = (row, ch, text, section, stage) => EV.push({ row, channel: ch, text, section, stage: !!stage });

      // I. READABLE — the recognizable exchange (short fragments, turn-taking)
      put(2, 'FIRST_WOMAN', 'Isn’t that Philip Glass?', 'readable');
      put(6, 'SECOND_WOMAN', 'I think it is.', 'readable');
      put(10, 'BAKER', 'Can I help you, sir?', 'readable');
      put(14, 'GLASS', 'a loaf of bread', 'readable');
      put(18, 'BAKER', 'Just a moment.', 'readable');
      put(22, 'FIRST_WOMAN', 'It’s time now.', 'readable');

      // II. PHASE — staggered ostinati enter one voice at a time, then lock
      for (let r = 26; r <= 44; r += 2) put(r, 'FIRST_WOMAN', 'isn’t that', 'phase');
      for (let r = 32; r <= 50; r += 2) put(r, 'SECOND_WOMAN', 'think it is', 'phase');
      for (let r = 38; r <= 56; r += 2) put(r, 'BAKER', 'help you sir', 'phase');
      for (let r = 44; r <= 62; r += 2) put(r, 'GLASS', 'yes I need', 'phase');
      for (let r = 58; r <= 63; r += 1) {
        put(r, 'FIRST_WOMAN', 'isn’t that', 'phase');
        put(r, 'SECOND_WOMAN', 'think it is', 'phase');
        put(r, 'GLASS', 'yes I need', 'phase');
        put(r, 'BAKER', 'help you sir', 'phase');
      }

      // III. FRAGMENT — phrases atomize into single words, scattered / phasing
      const FRAG = {
        FIRST_WOMAN: ['Philip', 'a'],
        SECOND_WOMAN: ['think', 'is'],
        GLASS: ['loaf', 'bread', 'yes'],
        BAKER: ['help', 'can', 'bread'],
      };
      const idx = { FIRST_WOMAN: 0, SECOND_WOMAN: 0, GLASS: 0, BAKER: 0 };
      const nextFrag = (ch) => FRAG[ch][idx[ch]++ % FRAG[ch].length];
      for (let r = 66; r <= 99; r += 1) {
        if (r % 2 === 0) put(r, 'FIRST_WOMAN', nextFrag('FIRST_WOMAN'), 'fragment');
        if (r % 2 === 1) put(r, 'SECOND_WOMAN', nextFrag('SECOND_WOMAN'), 'fragment');
        if (r % 3 === 0) put(r, 'GLASS', nextFrag('GLASS'), 'fragment');
        if (r % 3 === 2) put(r, 'BAKER', nextFrag('BAKER'), 'fragment');
      }

      // IV. UNISON — the four voices converge on the same word, same instant
      const UNI = ['Philip', 'can', 'think', 'bread', 'Bread', 'help', 'Philip', 'think', 'Philip', 'need', 'bread', 'loaf'];
      let ur = 103;
      for (const w of UNI) {
        for (const ch of CH) put(ur, ch, w, 'unison');
        ur += 2;
      }
      ur += 1;
      for (const ch of CH) put(ur, ch, 'loaf of bread', 'unison');
      ur += 3;
      for (const ch of CH) put(ur, ch, 'loaf of bread.', 'unison');
      const TOTAL = ur + 3;

      const SECTIONS = {
        readable: [0, 24],
        phase: [25, 64],
        fragment: [65, 101],
        unison: [102, TOTAL - 1],
      };

      const eventsByRow = new Map();
      const cellRef = new Map();
      for (const ev of EV) {
        if (!eventsByRow.has(ev.row)) eventsByRow.set(ev.row, []);
        eventsByRow.get(ev.row).push(ev);
      }

      // ---- audio ----
      // Sound sources, best-first:
      //   'voice' — pre-rendered NEURAL clips (window.SSE_VOICES, Resemble AI Chatterbox) played
      //             as Web Audio buffers: polyphonic (many at once) + zero-latency. One clip per
      //             unique line; per-channel pan/register + per-trigger humanization (detune,
      //             timing jitter, gain, LFO vibrato) make it four voices, human, never identical.
      //             If no neural clips are present, falls back to the Web Speech API.
      //   'tone'  — the Web Audio pitch stack (percussive reading).
      let silent = false;
      let soundMode = 'voice';

      // Each channel is a tracker lane placed across the stereo field. The clips are already four
      // distinct neural actors, so no pitch-register trick is needed — just position + humanization.
      const CHVOX = {
        FIRST_WOMAN: { pan: -0.5, rate: 1.0, gain: 0.98 },
        SECOND_WOMAN: { pan: -0.17, rate: 1.0, gain: 0.98 },
        GLASS: { pan: 0.17, rate: 1.0, gain: 1.0 },
        BAKER: { pan: 0.5, rate: 1.0, gain: 0.95 },
      };
      const rand = (a, b) => a + Math.random() * (b - a);

      // -- source A: real voices (Web Speech API) --
      const synth = window.speechSynthesis || null;
      // Per-$VOICE_CHANNEL character. `prefer` biases voice picking; pitch/rate keep the four
      // distinct even when the OS only exposes one or two real voices.
      const VOX = {
        FIRST_WOMAN: { pitch: 1.5, rate: 1.0, prefer: ['samantha', 'victoria', 'karen', 'moira', 'tessa', 'fiona', 'zira', 'female'] },
        SECOND_WOMAN: { pitch: 1.2, rate: 1.06, prefer: ['victoria', 'allison', 'ava', 'karen', 'moira', 'female'] },
        GLASS: { pitch: 0.7, rate: 0.9, prefer: ['daniel', 'alex', 'oliver', 'rishi', 'aaron', 'male'] },
        BAKER: { pitch: 0.88, rate: 1.0, prefer: ['fred', 'tom', 'reed', 'alex', 'daniel', 'male'] },
      };
      const VOICE_ASSIGN = {};
      function loadVoices() {
        if (!synth) return;
        const all = synth.getVoices() || [];
        if (!all.length) return;
        const en = all.filter((v) => /en(-|_|$)/i.test(v.lang));
        const pool = en.length ? en : all;
        const used = new Set();
        for (const ch of CH) {
          let pick = null;
          for (const h of VOX[ch].prefer) {
            pick = pool.find((v) => !used.has(v.name) && v.name.toLowerCase().includes(h));
            if (pick) break;
          }
          if (!pick) pick = pool.find((v) => !used.has(v.name)) || pool[0];
          if (pick) {
            VOICE_ASSIGN[ch] = pick;
            used.add(pick.name);
          }
        }
      }
      if (synth) {
        loadVoices();
        synth.addEventListener('voiceschanged', loadVoices);
      }
      function speak(events) {
        if (!synth) return false;
        // Same word struck by several channels on one row (unison) -> one clear utterance.
        const seen = new Map();
        for (const ev of events) if (!seen.has(ev.text)) seen.set(ev.text, ev.channel);
        // Track the playhead: never let a backlog build (Chrome also pauses if left idle).
        synth.resume();
        if (synth.pending) synth.cancel();
        for (const [text, ch] of seen) {
          const u = new SpeechSynthesisUtterance(text);
          const v = VOICE_ASSIGN[ch];
          if (v) u.voice = v;
          const spec = VOX[ch];
          u.pitch = spec.pitch;
          // Speak faster as tempo rises so words land on the beat.
          u.rate = Math.min(2.2, spec.rate * Math.max(1, rps / 3));
          u.volume = 1;
          synth.speak(u);
        }
        return true;
      }

      // -- source B: Web Audio tone stack (fallback) --
      let ctx = null;
      let master = null;
      function ensureCtx() {
        if (ctx) return true;
        try {
          const C = window.AudioContext || window.webkitAudioContext;
          if (!C) return false;
          ctx = new C();
          master = ctx.createGain();
          master.gain.value = 0.9;
          master.connect(ctx.destination);
          return true;
        } catch (err) {
          ctx = null;
          return false;
        }
      }
      function tone(channel, when) {
        if (!ctx || !master) return;
        const spec = TONES[channel];
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        osc.type = spec.t;
        osc.frequency.setValueAtTime(spec.f, when);
        env.gain.setValueAtTime(0.0001, when);
        env.gain.exponentialRampToValueAtTime(0.2, when + 0.015);
        env.gain.exponentialRampToValueAtTime(0.0001, when + 0.34);
        osc.connect(env);
        env.connect(master);
        osc.start(when);
        osc.stop(when + 0.4);
        osc.onended = () => {
          osc.disconnect();
          env.disconnect();
        };
      }

      // -- source 0: pre-rendered neural clips (window.SSE_VOICES) as Web Audio buffers --
      const SAMP = { buf: new Map(), ready: false, loading: false };
      function b64ToBuf(b64) {
        const bin = atob(b64);
        const u8 = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i += 1) u8[i] = bin.charCodeAt(i);
        return u8.buffer;
      }
      // Seconds of leading near-silence to skip so a trigger speaks immediately (no pre-roll lag).
      function leadOffset(buffer) {
        const d = buffer.getChannelData(0);
        const thresh = 0.012;
        let i = 0;
        for (; i < d.length; i += 1) if (Math.abs(d[i]) > thresh) break;
        const off = i / buffer.sampleRate - 0.02; // back off 20ms so the onset isn't clipped
        return off > 0 ? off : 0;
      }
      async function loadSamples() {
        if (SAMP.ready || SAMP.loading) return SAMP.ready;
        if (!window.SSE_VOICES || !ensureCtx() || !ctx) return false;
        SAMP.loading = true;
        const clips = window.SSE_VOICES.clips || {};
        await Promise.all(
          Object.entries(clips).map(async ([key, b64]) => {
            try {
              const buffer = await ctx.decodeAudioData(b64ToBuf(b64));
              SAMP.buf.set(key, { buffer, offset: leadOffset(buffer) });
            } catch (err) {
              /* skip an undecodable clip */
            }
          }),
        );
        SAMP.ready = SAMP.buf.size > 0;
        SAMP.loading = false;
        return SAMP.ready;
      }
      // Play one line on one channel: the character's own neural clip, humanized + panned.
      function playSample(channel, text, when) {
        const clip = SAMP.buf.get(`${channel}|${text}`) || SAMP.buf.get(text);
        if (!clip || !ctx || !master) return false;
        const spec = CHVOX[channel] || { pan: 0, rate: 1, gain: 1 };
        const src = ctx.createBufferSource();
        src.buffer = clip.buffer;
        src.playbackRate.value = spec.rate * rand(0.997, 1.003); // micro tempo/pitch drift
        if (src.detune) src.detune.value = rand(-8, 8); // cents of humanized detune
        const g = ctx.createGain();
        g.gain.value = spec.gain * rand(0.88, 1.0); // velocity variation
        // subtle pitch LFO — the "low-frequency oscillation"; kept small so speech stays natural
        let lfo = null;
        let lfoGain = null;
        if (src.detune) {
          lfo = ctx.createOscillator();
          lfo.type = 'sine';
          lfo.frequency.value = rand(4.5, 6.5);
          lfoGain = ctx.createGain();
          lfoGain.gain.value = rand(1.5, 4); // cents — barely-there life, not a warble
          lfo.connect(lfoGain).connect(src.detune);
        }
        const cleanup = (nodes) => () => {
          for (const n of nodes) n.disconnect();
          if (lfo) lfo.stop();
        };
        src.connect(g);
        let tail = [src, g];
        if (ctx.createStereoPanner) {
          const p = ctx.createStereoPanner();
          p.pan.value = spec.pan;
          g.connect(p);
          p.connect(master);
          tail = [src, g, p];
        } else {
          g.connect(master);
        }
        if (lfoGain) tail = tail.concat([lfoGain]);
        const t = Math.max(when, ctx.currentTime);
        src.onended = cleanup(tail);
        src.start(t, clip.offset || 0);
        if (lfo) lfo.start(t);
        return true;
      }

      function voice(events) {
        if (silent || !events || !events.length) return;
        if (soundMode === 'voice') {
          if (window.SSE_VOICES) {
            if (SAMP.ready) {
              const base = ctx.currentTime + 0.015;
              let any = false;
              // per-event timing jitter so voices don't lock to a machine grid
              for (const ev of events) if (playSample(ev.channel, ev.text, base + rand(0, 0.028))) any = true;
              if (any) return;
            } else {
              loadSamples(); // still decoding — skip this row rather than beep robotically
              return;
            }
          } else if (synth && speak(events)) {
            return; // no neural clips available -> Web Speech
          }
        }
        if (!ensureCtx() || !ctx) return; // 'tone' mode, or final fallback
        const now = ctx.currentTime;
        for (const ev of events) tone(ev.channel, now);
      }

      // ---- build view ----
      const track = document.getElementById('track');
      const viewport = document.getElementById('viewport');
      const heads = document.getElementById('heads');

      const gh = document.createElement('div');
      gh.className = 'h gut';
      heads.appendChild(gh);
      for (const c of CH) {
        const el = document.createElement('div');
        el.className = 'h';
        el.textContent = HEAD[c];
        heads.appendChild(el);
      }

      const rowEls = [];
      for (let r = 0; r < TOTAL; r += 1) {
        const row = document.createElement('div');
        row.className = 'row';
        row.style.position = 'relative';
        const num = document.createElement('div');
        num.className = 'rownum';
        num.textContent = r % 4 === 0 ? String(r).padStart(2, '0') : '';
        row.appendChild(num);
        for (const c of CH) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cellRef.set(r + ':' + c, cell);
          row.appendChild(cell);
        }
        track.appendChild(row);
        rowEls.push(row);
      }
      for (const ev of EV) {
        const cell = cellRef.get(ev.row + ':' + ev.channel);
        if (!cell) continue;
        const span = document.createElement('span');
        span.className = 'word' + (ev.stage ? ' stage' : '');
        span.textContent = ev.text;
        cell.appendChild(span);
        ev.el = span;
      }

      // ---- state + transport ----
      let playing = false;
      let currentRow = 0;
      let rps = 3;
      let sel = 'full';
      let rafId = null;
      let lastTs = 0;
      let acc = 0;
      let rowH = 26;
      let visibleRows = 24;
      let hereEl = null;
      let nowWords = [];

      function measure() {
        rowH = rowEls[0] ? rowEls[0].offsetHeight : 26;
        visibleRows = Math.max(8, Math.floor(viewport.clientHeight / rowH));
      }
      function range() {
        return sel === 'full' ? [0, TOTAL - 1] : SECTIONS[sel];
      }
      function clearPerformed() {
        for (const ev of EV) {
          if (ev.el) ev.el.classList.remove('spoken', 'now');
        }
        nowWords = [];
      }
      function render(row) {
        if (hereEl) hereEl.classList.remove('here');
        const el = rowEls[row];
        el.classList.add('here');
        hereEl = el;
        const lead = Math.floor(visibleRows * 0.4);
        const maxOff = Math.max(0, track.scrollHeight - viewport.clientHeight);
        const off = Math.min(Math.max(0, (row - lead) * rowH), maxOff);
        track.style.transform = 'translateY(' + -off + 'px)';
      }
      function illuminate(row) {
        for (const w of nowWords) w.classList.remove('now');
        nowWords = [];
        const evs = eventsByRow.get(row);
        if (!evs) return;
        for (const ev of evs) {
          if (!ev.el) continue;
          ev.el.classList.add('spoken');
          void ev.el.offsetWidth;
          ev.el.classList.add('now');
          nowWords.push(ev.el);
        }
      }
      function advance(row) {
        currentRow = row;
        render(row);
        illuminate(row);
        const evs = eventsByRow.get(row);
        if (evs) voice(evs);
      }

      function loop(ts) {
        const dt = (ts - lastTs) / 1000;
        lastTs = ts;
        acc += dt * rps;
        const [s, e] = range();
        let guard = 0;
        while (acc >= 1 && guard < 8) {
          acc -= 1;
          if (currentRow >= e) {
            clearPerformed();
            advance(s);
          } else {
            advance(currentRow + 1);
          }
          guard += 1;
        }
        rafId = requestAnimationFrame(loop);
      }
      function play() {
        if (playing) return;
        // Prime the active sound source on the gesture (autoplay/TTS both require it).
        if (!silent) {
          ensureCtx();
          if (ctx && ctx.state === 'suspended') ctx.resume();
          if (soundMode === 'voice') {
            if (window.SSE_VOICES) loadSamples();
            else if (synth) {
              loadVoices();
              synth.resume();
            }
          }
        }
        const [s, e] = range();
        if (currentRow < s || currentRow >= e) {
          clearPerformed();
          advance(s);
        }
        playing = true;
        playBtn.classList.add('on');
        playBtn.textContent = '❚❚ Pause';
        lastTs = performance.now();
        acc = 0;
        rafId = requestAnimationFrame(loop);
      }
      function pause() {
        playing = false;
        playBtn.classList.remove('on');
        playBtn.textContent = '▷ Perform';
        if (synth) synth.cancel();
        if (rafId !== null) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
      }

      const playBtn = document.getElementById('play');
      const restartBtn = document.getElementById('restart');
      const soundSeg = document.getElementById('sound');
      const tempo = document.getElementById('tempo');
      const sections = document.getElementById('sections');

      playBtn.addEventListener('click', () => (playing ? pause() : play()));
      restartBtn.addEventListener('click', () => {
        const [s] = range();
        acc = 0;
        clearPerformed();
        advance(s);
      });
      soundSeg.addEventListener('click', (e) => {
        const b = e.target.closest('button');
        if (!b) return;
        const m = b.dataset.m;
        for (const btn of soundSeg.children) btn.classList.toggle('on', btn === b);
        if (m === 'off') {
          silent = true;
          if (synth) synth.cancel();
          if (ctx && ctx.state === 'running') ctx.suspend();
          return;
        }
        silent = false;
        soundMode = m;
        ensureCtx();
        if (ctx && ctx.state === 'suspended') ctx.resume();
        if (m === 'voice') {
          if (window.SSE_VOICES) loadSamples();
          else if (synth) {
            loadVoices();
            synth.resume();
          }
        }
      });
      tempo.addEventListener('input', () => {
        rps = parseFloat(tempo.value);
      });
      sections.addEventListener('click', (e) => {
        const b = e.target.closest('button');
        if (!b) return;
        sel = b.dataset.s;
        for (const btn of sections.children) btn.classList.toggle('on', btn === b);
        const [s] = range();
        acc = 0;
        clearPerformed();
        advance(s);
      });
      window.addEventListener('resize', () => {
        measure();
        render(currentRow);
      });

      measure();
      advance(0);
    </script>
  </body>
</html>
